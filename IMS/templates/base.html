{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamro Mart</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background: #212529;
            width: 250px;
            position: fixed;
            transition: all 0.3s;
        }

        /* Default Link Style */
        .sidebar a {
            color: #adb5bd !important;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            border-left: 4px solid transparent;
            transition: 0.3s;
        }

        /* Hover Effect: Changes color and slides slightly to the right */
        .sidebar a:hover {
            background: #343a40;
            color: #ffffff !important;
            padding-left: 25px;
        }

        /* Active State: The link for the current page */
        .sidebar a.active {
            background: #0d6efd;
            /* Blue background */
            color: #ffffff !important;
            border-left: 4px solid #fff;
            /* White stripe on the left */
            font-weight: bold;
        }

        .main-content {
            margin-left: 250px;
            padding: 20px;
            width: calc(100% - 250px);
        }

        .logo-img {
            max-width: 80px;
            /* Adjust size as needed */
            height: auto;
            border-radius: 10px;
            /* Optional: adds rounded corners */
            transition: transform 0.3s;
        }

        .logo-img:hover {
            transform: scale(1.1);
            /* Slight zoom when hovered */
        }

        /* Adjust sidebar header spacing */
        .sidebar .p-3 {
            padding-top: 25px !important;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="p-3 text-center">
            <!-- 2. The Logo Tag -->
            <a href="{% url 'dashboard' %}">
                <img src="{% static 'images/logo.png' %}" alt="Clothing Mart Logo" class="logo-img mb-2">
            </a>
            <h4 class="text-white fw-bold">Mart Admin</h4>
        </div>
        <hr class="text-secondary">

        {% with request.resolver_match.url_name as url_name %}

        <a href="{% url 'dashboard' %}" class="{% if url_name == 'dashboard' %}active{% endif %}">
            <i class="bi bi-speedometer2 me-2"></i> Dashboard
        </a>

        <a href="{% url 'pos' %}" class="{% if url_name == 'pos' %}active{% endif %}">
            <i class="bi bi-calculator me-2"></i> POS System
        </a>

        <a href="{% url 'product_list' %}" class="{% if url_name == 'product_list' %}active{% endif %}">
            <i class="bi bi-bag me-2"></i> Inventory
        </a>

        <a href="{% url 'sales_report' %}"
            class="{% if url_name == 'sales_report' or url_name == 'receipt_detail' %}active{% endif %}">
            <i class="bi bi-graph-up-arrow me-2"></i> Sales Reports
        </a>

        <a href="/admin/" target="_blank">
            <i class="bi bi-shield-lock me-2"></i> Backend Admin
        </a>

        {% endwith %}

        <div class="position-absolute bottom-0 w-100 p-3">
            <!-- We use a form with POST for security -->
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-link text-danger text-decoration-none p-0 m-0">
                    <i class="bi bi-box-arrow-right me-2"></i> Logout
                </button>
            </form>
        </div>

    </div>

    <!-- Main Body -->
    <div class="main-content">
        <!-- Top Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white mb-4 rounded shadow-sm">
            <div class="container-fluid">
                <span class="navbar-brand">Overview</span>
                <div class="ms-auto">
                    <span class="me-3">Welcome, <strong>Admin</strong></span>
                    <a href="#" class="btn btn-outline-light btn-sm">Logout</a>
                </div>
            </div>
        </nav>

        {% block content %}
        <!-- Page specific content goes here -->
        {% endblock %}
    </div>

    <!-- Chart.js and Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
