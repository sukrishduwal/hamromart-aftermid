<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Mart Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #212529; color: white; width: 250px; position: fixed; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #343a40; color: white; border-left: 4px solid #0d6efd; }
        .main-content { margin-left: 250px; padding: 20px; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="p-3">
            <h4 class="text-white">Mart Admin</h4>
        </div>
        <hr>
        <a href="{% url 'dashboard' %}" class="active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
        <a href="{% url 'product_list' %}"><i class="bi bi-bag me-2"></i> Products</a>
        <a href="#"><i class="bi bi-cart-check me-2"></i> Orders</a>
        <a href="#"><i class="bi bi-graph-up me-2"></i> Sales Reports</a>
        <a href="#"><i class="bi bi-gear me-2"></i> Settings</a>
    </div>

    <!-- Main Body -->
    <div class="main-content">
        <!-- Top Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white mb-4 rounded shadow-sm">
            <div class="container-fluid">
                <span class="navbar-brand">Overview</span>
                <div class="ms-auto">
                    <span class="me-3">Welcome, <strong>Admin</strong></span>
                    <a href="#" class="btn btn-outline-danger btn-sm">Logout</a>
                </div>
            </div>
        </nav>

        {% block content %}
        <!-- Page specific content goes here -->
        {% endblock %}
    </div>

    <!-- Chart.js and Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
