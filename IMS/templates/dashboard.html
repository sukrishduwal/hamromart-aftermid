{% extends 'base.html' %}

{% block content %}
<div class="row g-4 mb-4">
    <!-- Sales Card -->
    <div class="col-md-4">
        <div class="card p-3 shadow-sm border-0">
            <div class="d-flex align-items-center">
                <div class="btn btn-primary btn-lg rounded-circle me-3"><i class="bi bi-currency-dollar"></i></div>
                <div>
                    <h6 class="text-muted mb-0">Total Sales</h6>
                    <h4 class="fw-bold mb-0">${{ total_sales|default:"0" }}</h4>
                </div>
            </div>
        </div>
    </div>
    <!-- POS Card -->
    <div class="col-md-4">
        <div class="card p-3 shadow-sm border-0">
            <div class="d-flex align-items-center">
                <div class="btn btn-success btn-lg rounded-circle me-3"><i class="bi bi-cart"></i></div>
                <div>
                    <h6 class="text-muted mb-0">Total POS Transactions</h6>
                    <h4 class="fw-bold mb-0">{{ total_orders|default:"0" }}</h4>
                </div>
            </div>
        </div>
    </div>
    <!-- Inventory Alert Card -->
    <div class="col-md-4">
        <div class="card p-3 shadow-sm border-0">
            <div class="d-flex align-items-center">
                <div class="btn btn-warning btn-lg rounded-circle me-3 text-white"><i class="bi bi-exclamation-triangle"></i></div>
                <div>
                    <h6 class="text-muted mb-0">Low Stock</h6>
                    <h4 class="fw-bold mb-0 text-danger">{{ low_stock }} Items</h4>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card p-4 shadow-sm border-0">
            <h5>Sales Performance</h5>
            <!-- Only ONE canvas tag here -->
            <div style="height: 300px;">
                <canvas id="salesChart"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-4 shadow-sm border-0">
            <h5>Top Categories</h5>
            <ul class="list-group list-group-flush mt-3">
                <li class="list-group-item d-flex justify-content-between align-items-center">T-Shirts <span class="badge bg-primary rounded-pill">45%</span></li>
                <li class="list-group-item d-flex justify-content-between align-items-center">Jeans <span class="badge bg-primary rounded-pill">30%</span></li>
                <li class="list-group-item d-flex justify-content-between align-items-center">Jackets <span class="badge bg-primary rounded-pill">25%</span></li>
            </ul>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Ensure the script runs only AFTER the page and Chart.js are fully loaded
    window.addEventListener('load', function() {
        const ctx = document.getElementById('salesChart');
        
        if (ctx) {
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: {{ labels|safe|default:"[]" }},
                    datasets: [{
                        label: 'Revenue ($)',
                        data: {{ data|safe|default:"[]" }},
                        borderColor: '#0d6efd',
                        backgroundColor: 'rgba(13, 110, 253, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }
    });
</script>
{% endblock %}
