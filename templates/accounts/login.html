{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hamro Mart</title>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary: #ffb6c1b9; 
            --primary-hover: #850404;
            --bg-start: #ffb6c18a; 
            --bg-end: #ffb6c18a; 
            --font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 3rem 2.5rem;
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: #ffffff;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-2px);
        }

        .form-control {
            border-color: #cbd5e1;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            font-weight: 700;
            border-radius: 12px;
            padding: 12px;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.3);
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary) 0%, #3b82f6 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 2.25rem;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        .logo-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <div class="card login-card">
            <a class="d-inline-block me-3 ">
                <img src="{% static 'images/logo.png' %}" alt="Clothing Mart Logo" class="logo-img">
            </a>
            <h3 class="fw-extrabold text-dark mb-1"align="center" style="letter-spacing: 0.5px;">Hamro Mart</h3>
            <!-- <p class="text-muted small">Sign in to access your inventory portal</p> -->
        
        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="alert alert-danger p-2.5 small mb-3 rounded-3 d-flex align-items-center" role="alert">
                <i class="bi bi-exclamation-circle-fill me-2" style="font-size: 1.1rem;"></i>
                <div>Your username and password did not match. Please try again.</div>
            </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label small fw-bold text-dark mb-1.5" style="letter-spacing: 0.2px;">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0" style="border-radius: 12px 0 0 12px; border-color: #cbd5e1;"><i class="bi bi-person-fill"></i></span>
                    <input type="text" name="username" class="form-control border-start-0" placeholder="Enter username" style="border-radius: 0 12px 12px 0; border-color: #cbd5e1;" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label small fw-bold text-dark mb-1.5" style="letter-spacing: 0.2px;">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0" style="border-radius: 12px 0 0 12px; border-color: #cbd5e1;"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" placeholder="Enter password" style="border-radius: 0 12px 12px 0; border-color: #cbd5e1;" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>
    </div>
</body>

</html>
