{% extends 'base.html' %}

{% block page_title %}Discount Settings{% endblock %}

{% block content %}
<style>
       .discount-hero {
              background: linear-gradient(135deg, rgba(244, 114, 182, 0.12) 0%, rgba(229, 231, 235, 0.72) 100%);
              border: 1px solid rgba(244, 114, 182, 0.15);
              border-radius: 50px;
              overflow: hidden;
       }

       .discount-accent {
              width: 72px;
              height: 72px;
              border-radius: 18px;
              display: inline-flex;
              align-items: center;
              justify-content: center;
              background: linear-gradient(135deg, #f9a8d4 0%, #e5e7eb 100%);
              color: #7c2d5f;
              box-shadow: 0 12px 24px rgba(244, 114, 182, 0.18);
       }

       .discount-card {
              border: 1px solid rgba(148, 163, 184, 0.18);
              border-radius: 22px;
              box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
              overflow: hidden;
              background: #fff;
       }

       .discount-card .card-header {
              background: linear-gradient(135deg, #fce7f3 0%, #f3f4f6 100%);
              border-bottom: 1px solid rgba(148, 163, 184, 0.14);
       }

       .discount-label {
              font-size: 18 px;
              font-weight: 700;
              letter-spacing: 0.3px;
              color: #475569;
              margin-bottom: 0.45rem;
       }

       .discount-input.form-control {
              border-radius: 14px;
              background: #fafafa;
              border: 1px solid #d8dce3;
              padding: 0.9rem 1rem;
       }

       .discount-input.form-control:focus {
              background: #fff;
              border-color: #f472b6;
              box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.14);
       }

       .discount-note {
              background: #fafafa;
              border: 1px dashed rgba(148, 163, 184, 0.35);
              border-radius: 16px;
       }
</style>

<div class="container py-4">
       <div class="row justify-content-center">
              <div class="col-lg-8 col-xl-7">

                     <div class="discount-card card-premium border-0">

                            <div class="card-header px-4 px-md-5 py-4">
                                   <div class="d-flex flex-column flex-md-row align-items-md-center gap-3">
                                          <div class="discount-accent">
                                                 <i class="bi bi-tags-fill fs-3"></i>
                                          </div>

                                          <div>
                                                 <h3 class="fw-bold text-dark mb-1">
                                                        Discount Settings
                                                 </h3>
                                          </div>
                                   </div>
                            </div>

                            <div class="card-body p-4 p-md-5">

                                   <form method="POST" class="needs-validation" novalidate>
                                          {% csrf_token %}

                                          <div class="row g-4">

                                                 <div class="col-12">
                                                        <label class="discount-label" for="min_purchase">
                                                               Minimum Purchase
                                                        </label>
                                                        <input
                                                               type="number"
                                                               class="form-control discount-input"
                                                               id="min_purchase"
                                                               name="min_purchase"
                                                               value="{{ scheme.min_purchase }}"
                                                               min="0"
                                                               step="1">
                                                 </div>

                                                 <div class="col-12">
                                                        <label class="discount-label" for="step_amount">
                                                               Step Amount
                                                        </label>
                                                        <input
                                                               type="number"
                                                               class="form-control discount-input"
                                                               id="step_amount"
                                                               name="step_amount"
                                                               value="{{ scheme.step_amount }}"
                                                               min="0"
                                                               step="1">
                                                 </div>

                                                 <div class="col-12">
                                                        <label class="discount-label" for="step_discount">
                                                               Discount Per Step (%)
                                                        </label>
                                                        <input
                                                               type="number"
                                                               class="form-control discount-input"
                                                               id="step_discount"
                                                               name="step_discount"
                                                               value="{{ scheme.step_discount }}"
                                                               min="0"
                                                               step="0.01">
                                                 </div>

                                                 <div class="col-12">
                                                        <label class="discount-label" for="max_discount">
                                                               Maximum Discount (%)
                                                        </label>
                                                        <input
                                                               type="number"
                                                               class="form-control discount-input"
                                                               id="max_discount"
                                                               name="max_discount"
                                                               value="{{ scheme.max_discount }}"
                                                               min="0"
                                                               step="0.01">
                                                 </div>

                                          </div>

                                          <div class="d-flex justify-content-end pt-4">
                                                 <button type="submit" class="btn btn-primary px-4">
                                                        <i class="bi bi-check2-circle me-2"></i>
                                                        Save Discount
                                                 </button>
                                          </div>

                                   </form>

                            </div>

                     </div>

              </div>
       </div>
</div>

{% endblock %}
