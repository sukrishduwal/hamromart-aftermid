{% extends "base.html" %}

{% block page_title %}Add Group{% endblock %}

{% block content %}

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Add New Group</h4>
                </div>

                <div class="card-body">

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-info">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <label class="form-label">
                            Group Name
                        </label>

                        <input 
                            type="text"
                            name="name"
                            class="form-control mb-3"
                            placeholder="Example: Manager, Cashier, Staff"
                            required
                        >

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'staff_management' %}" 
                               class="btn btn-secondary">
                                Back
                            </a>

                            <button type="submit" 
                                    class="btn btn-success">
                                Add Group
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
